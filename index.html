<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yenilənməsi - Təklif</title>
    <style>
        body { background-color: #000; color: #0f0; font-family: 'Courier New', Courier, monospace; overflow: hidden; margin: 0; height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; cursor: pointer; }
        #terminal { padding: 20px; font-size: 18px; line-height: 1.6; text-align: left; width: 90%; max-width: 600px; }
        .hidden { display: none !important; }
        #gallery { width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        img { max-width: 85%; max-height: 65vh; border: 2px solid #0f0; box-shadow: 0 0 20px #0f0; object-fit: contain; margin-bottom: 20px; }
        .caption { font-size: 22px; font-weight: bold; margin: 15px; color: #0f0; min-height: 50px; }
        .btn { background: #0f0; color: #000; border: none; padding: 15px 30px; font-size: 18px; cursor: pointer; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
        .btn:hover { background: #0c0; }
        #final-screen { width: 100%; padding: 20px; }
        .cursor { display: inline-block; width: 10px; height: 20px; background: #0f0; animation: blink 0.7s infinite; vertical-align: middle; }
        @keyframes blink { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>

    <div id="terminal">
        <div id="lines"></div>
        <span id="cursor" class="cursor"></span>
    </div>

    <div id="gallery" class="hidden">
        <img id="current-img" src="" alt="Xatirə">
        <p id="current-caption" class="caption"></p>
        <button class="btn" onclick="nextPhoto(event)">Növbəti Addım >></button>
    </div>

    <div id="final-screen" class="hidden">
        <h1 style="font-size: 32px; color: #0f0;">SİSTEM YENİLƏNMƏSİ TAMAMLANDI</h1>
        <p style="font-size: 24px;">Yeni Status: ÖMÜRLÜK YOLDAŞ</p>
        <p style="font-size: 20px; margin-bottom: 30px;">Mənimlə evlənərsən?</p>
        <button class="btn" onclick="alert('Dünyanın ən xoşbəxt adamı mənəm!')">BƏLİ</button>
        <button class="btn" onclick="alert('Səni çox sevirəm!')" style="margin-left: 10px;">ƏLBƏTTƏ BƏLİ</button>
    </div>

    <audio id="bg-music" loop preload="auto">
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script>
        const lines = [
            "> Root access granted...",
            "> Loading emotional_database.db...",
            "> Found 7 unique memory_fragments...",
            "> Optimizing future_parameters...",
            "> System ready for transition.",
            "> Sürprizi açmaq üçün bura toxun..."
        ];

        let lineIdx = 0;
        const linesDiv = document.getElementById("lines");

        function typeWriter() {
            if (lineIdx < lines.length) {
                linesDiv.innerHTML += lines[lineIdx] + "<br>";
                lineIdx++;
                setTimeout(typeWriter, 1200);
            }
        }

        const photos = [
            { src: "1.JPG", text: "Hər şeyin başladığı o ilk gün..." },
            { src: "2.JPG", text: "Səninlə hər an bir möcüzədir." },
            { src: "3.JPG", text: "Birlikdə ən çox güldüyümüz anlar." },
            { src: "4.JPG", text: "Yolumuz həmişə sevgiylə dolu olsun." },
            { src: "5.JPG", text: "Sən yanımda olanda dünya daha gözəldir." },
            { src: "6.JPG", text: "Gələcəyə baxdığım ən gözəl mənzərəsən." },
            { src: "7.JPG", text: "Və budur, bizim ən böyük hekayəmiz..." }
        ];

        let photoIdx = 0;

        // Terminal bitdikdən sonra ilk toxunuşda hər şey aktivləşir
        document.body.addEventListener('click', function() {
            if (lineIdx >= lines.length && document.getElementById("gallery").classList.contains("hidden")) {
                const audio = document.getElementById("bg-music");
                audio.play();
                
                document.getElementById("terminal").classList.add("hidden");
                document.getElementById("gallery").classList.remove("hidden");
                showPhoto();
            }
        });

        function showPhoto() {
            const imgElement = document.getElementById("current-img");
            imgElement.src = photos[photoIdx].src;
            document.getElementById("current-caption").innerText = photos[photoIdx].text;
        }

        function nextPhoto(event) {
            event.stopPropagation(); // Butona basanda body click-i işləməsin
            photoIdx++;
            if (photoIdx < photos.length) {
                showPhoto();
            } else {
                document.getElementById("gallery").classList.add("hidden");
                document.getElementById("final-screen").classList.remove("hidden");
            }
        }

        window.onload = typeWriter;
    </script>
</body>
</html>
